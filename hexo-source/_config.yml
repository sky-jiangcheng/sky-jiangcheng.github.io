# Hexo Configuration
## Docs: https://hexo.io/docs/configuration.html

# Site
title: Sky - Jiang Cheng
subtitle: ''
description: '8年后端开发经验, 专注Java/Docker/SpringBoot/Dubbo技术栈, 记录踩坑心得与技术思考'
keywords:
  - Java
  - Docker
  - SpringBoot
  - Dubbo
  - Node.js
  - Hexo
  - 后端开发
author: Jiang Cheng
language: zh-CN
timezone: 'Asia/Shanghai'

# URL
url: http://sky-jiangcheng.github.io
permalink: :year/:month/:day/:title/
permalink_defaults:
pretty_urls:
  trailing_index: true
  trailing_html: true

# Directory
source_dir: source
public_dir: ..
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render:
  - 'images/**'
  - 'favicon.png'
  - 'fonts/**'
  - 'js/**'
  - 'css/**'
  - 'fancybox/**'
  - 'lib/**'

# Writing
new_post_name: :title.md
default_layout: post
titlecase: false
external_link:
  enable: true
  field: site
  exclude: ''
filename_case: 0
render_drafts: false
post_asset_folder: false
relative_link: false
future: true
syntax_highlighter: highlight.js
highlight:
  line_number: true
  auto_detect: false
  tab_replace: ''
  wrap: true
  hljs: false
prismjs:
  preprocess: true
  line_number: true
  tab_replace: ''

index_generator:
  path: ''
  per_page: 10
  order_by: -date

default_category: uncategorized
category_map:
  Java: java
  Docker: docker
  SpringBoot: springboot
  Dubbo: dubbo
  Hexo: hexo
  Node.js: nodejs
tag_map:

meta_generator: true

date_format: YYYY-MM-DD
time_format: HH:mm:ss
updated_option: 'mtime'

per_page: 10
pagination_dir: page

include:
exclude:
ignore:

theme: pure

deploy:
  type: git
  repo: https://github.com/sky-jiangcheng/sky-jiangcheng.github.io
  branch: master

search:
  path: search.xml
  field: post
  content: true
  format: html

jsonContent:
  meta: false
  pages: false
  posts:
    title: true
    date: true
    path: true
    text: true
    raw: false
    content: false
    slug: false
    updated: false
    comments: false
    link: false
    permalink: false
    excerpt: false
    categories: true
    tags: true

feed:
  enable: true
  type:
    - atom
    - rss2
  path:
    - atom.xml
    - rss2.xml
  limit: 20
  hub:
  content: true
  content_limit: 140
  content_limit_delim: ' '
  order_by: -date
  icon: favicon.png
  autodiscovery: true
  template:

wordCount:
  enable: true
  wordCount: true
  min2read: true
